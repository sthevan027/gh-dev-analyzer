name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '*.md'

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules/**
            !.git/**
