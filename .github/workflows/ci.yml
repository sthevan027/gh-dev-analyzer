name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v1
        with:
          pwsh-version: "7.4"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $settings = @{
            Severity = @('Error', 'Warning')
            ExcludeRules = @('PSAvoidUsingWriteHost')
          }
          $results = Invoke-ScriptAnalyzer -Path ./src -Recurse -Settings $settings
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer: nenhum problema encontrado"

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./tests"
          $config.Run.Exit = $true
          $config.Output.Verbosity = "Detailed"
          Invoke-Pester -Configuration $config

      - name: Smoke test
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $outputPath = Join-Path $env:RUNNER_TEMP "smoke-test-output.html"
          ./scripts/analyze-github.ps1 -Username octocat -OutputPath $outputPath
          if (-not (Test-Path $outputPath)) {
            throw "Smoke test falhou: arquivo de saída não foi criado"
          }
          $content = Get-Content $outputPath -Raw
          if ($content -notmatch "<!DOCTYPE html>") {
            throw "Smoke test falhou: saída não é HTML válido"
          }
          Write-Host "Smoke test: OK"
