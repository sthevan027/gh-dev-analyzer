name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-and-test:
    name: Analyze & Test (PowerShell 7)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PowerShell modules
        uses: actions/cache@v4
        with:
          # Windows pwsh usa Documents/PowerShell/Modules; Linux/macOS usa ~/.local/share/powershell/Modules
          path: ${{ runner.os == 'Windows' && 'C:/Users/runneradmin/Documents/PowerShell/Modules' || '~/.local/share/powershell/Modules' }}
          key: pwsh-modules-${{ runner.os }}-pester5-${{ hashFiles('PSScriptAnalyzerSettings.psd1') }}

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber
          }

      - name: Install Pester
        shell: pwsh
        run: |
          # Garante Pester 5+ (testes usam sintaxe Should -Be, Should -Match)
          $pester = Get-Module -ListAvailable Pester | Sort-Object Version -Descending | Select-Object -First 1
          if (-not $pester -or [version]$pester.Version -lt [version]"5.0.0") {
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $settings = @{
            Severity = @('Error')
            ExcludeRules = @(
              'PSAvoidUsingWriteHost',
              'PSAvoidAssignmentToAutomaticVariable',
              'PSUseDeclaredVarsMoreThanAssignments'
            )
          }
          $results = Invoke-ScriptAnalyzer -Path ./src -Recurse -Settings $settings
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer: nenhum problema encontrado"

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = "./tests"
          $config.Run.Exit = $true
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = "./src/*.ps1"
          $config.CodeCoverage.OutputFormat = 'JaCoCo'
          $config.CodeCoverage.OutputPath = "coverage.xml"
          $config.Output.Verbosity = "Detailed"
          Invoke-Pester -Configuration $config

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Smoke test
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Garante que gh use o token em ambiente CI
          if ($env:GH_TOKEN) { $env:GH_TOKEN | gh auth login --with-token }
          $outputPath = Join-Path $env:RUNNER_TEMP "smoke-test-output.html"
          ./scripts/analyze-github.ps1 -Username octocat -OutputPath $outputPath
          if (-not (Test-Path $outputPath)) {
            throw "Smoke test falhou: arquivo de saída não foi criado"
          }
          $content = Get-Content $outputPath -Raw
          if ($content -notmatch "<!DOCTYPE html>") {
            throw "Smoke test falhou: saída não é HTML válido"
          }
          Write-Host "Smoke test: OK"
